<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Tweet Collector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; color: #111; background: #fff; width: 320px; padding: 12px; }
    h1 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #000; }
    .empty { color: #999; font-size: 12px; padding: 8px 0; }
    .account { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .account-header { display: flex; align-items: center; justify-content: space-between; }
    .account-name { font-weight: 600; }
    .count { background: #f3f4f6; border-radius: 12px; padding: 1px 8px; font-size: 11px; color: #374151; }
    .actions { display: flex; gap: 6px; margin-top: 8px; }
    button { cursor: pointer; border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 10px; font-size: 11px; background: #fff; color: #374151; }
    button:hover { background: #f9fafb; }
    button.primary { background: #111; color: #fff; border-color: #111; }
    button.primary:hover { background: #374151; }
    button.danger { color: #ef4444; border-color: #fecaca; }
    button.danger:hover { background: #fef2f2; }
    .footer { margin-top: 10px; display: flex; justify-content: space-between; }
    .hint { color: #9ca3af; font-size: 11px; margin-top: 10px; line-height: 1.5; }
    .status { font-size: 11px; color: #16a34a; margin-top: 6px; display: none; }
  </style>
</head>
<body>
  <h1>X Tweet Collector</h1>
  <div id="list"><p class="empty">No tweets collected yet.<br/>Navigate to an X profile and scroll.</p></div>
  <p class="hint" id="hint">Scroll a profile page — tweets are captured automatically as they load.</p>
  <div class="footer">
    <button id="clearAll" class="danger" style="display:none">Clear all</button>
  </div>
  <p class="status" id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
